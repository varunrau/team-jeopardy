<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Jeopardy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; text-wrap: pretty; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            background: #060CE9;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        button { font-family: inherit; }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }
        .subtitle {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        #create-btn {
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: 700;
            background: #FFD700;
            color: #060CE9;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        #create-btn:hover {
            opacity: 0.85;
        }
        #create-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 1.5rem;
            font-size: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h1>Jeopardy!</h1>
    <button id="create-btn" onclick="createGame()">Create New Game</button>
    <p class="status" id="status"></p>

    <script>
        async function createGame() {
            const btn = document.getElementById('create-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.textContent = 'Creating game...';

            try {
                const resp = await fetch('/api/games', { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Failed to create game');
                }
                const data = await resp.json();
                window.location.href = '/lobby/' + data.game_id;
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
