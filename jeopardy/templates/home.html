<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Jeopardy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #060CE9;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        #create-btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            background: #FFD700;
            color: #060CE9;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        #create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255,215,0,0.4);
        }
        #create-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 1.5rem;
            font-size: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h1>Jeopardy!</h1>
    <p class="subtitle">Real-time multiplayer trivia game</p>
    <button id="create-btn" onclick="createGame()">Create New Game</button>
    <p class="status" id="status"></p>

    <script>
        async function createGame() {
            const btn = document.getElementById('create-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.textContent = 'Creating game...';

            try {
                const resp = await fetch('/api/games', { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Failed to create game');
                }
                const data = await resp.json();
                window.location.href = '/lobby/' + data.game_id;
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
