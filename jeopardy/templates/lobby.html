<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy - Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            background: #060CE9;
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }
        button, input { font-family: inherit; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .game-id {
            text-align: center;
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 2rem;
        }
        .section {
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #FFD700;
        }
        .add-team-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .add-team-form input {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #FFD700;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
        }
        .add-team-form input::placeholder { color: rgba(255,255,255,0.5); }
        .add-team-form input:focus { background: rgba(255,255,255,0.2); }
        .add-team-form button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            background: #FFD700;
            color: #060CE9;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .add-team-form button:hover { background: #FFC800; }
        .teams-list {
            list-style: none;
        }
        .team-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .team-card .team-name {
            font-size: 1rem;
            font-weight: 700;
            flex: 1;
        }
        .team-card img {
            width: 120px;
            height: 120px;
            border-radius: 4px;
        }
        .team-card .team-url {
            font-size: 1rem;
            opacity: 0.6;
            word-break: break-all;
        }
        #start-btn {
            display: block;
            margin: 2rem auto;
            padding: 1rem 3rem;
            font-size: 1rem;
            font-weight: 700;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #start-btn:hover { background: #218838; }
        #start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .status-msg {
            text-align: center;
            margin-top: 1rem;
            font-size: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h1>Game Lobby</h1>
    <p class="game-id">Game ID: {{ game_id }}</p>

    <div class="section">
        <h2>Add Team</h2>
        <div class="add-team-form">
            <input type="text" id="team-name-input" placeholder="Team name..." maxlength="30">
            <button onclick="addTeam()">Add</button>
        </div>

        <h2>Teams</h2>
        <ul class="teams-list" id="teams-list">
            {% for team_id, info in team_qr_codes.items() %}
            <li class="team-card">
                <div>
                    <div class="team-name">{{ info.name }}</div>
                    <div class="team-url">{{ info.url }}</div>
                </div>
                <img src="{{ info.qr }}" alt="QR code for {{ info.name }}">
            </li>
            {% endfor %}
        </ul>
    </div>

    <button id="start-btn" onclick="startGame()">Start Game</button>
    <p class="status-msg" id="status"></p>

    <script>
        const gameId = "{{ game_id }}";

        async function addTeam() {
            const input = document.getElementById('team-name-input');
            const name = input.value.trim();
            if (!name) return;

            try {
                const resp = await fetch(`/api/games/${gameId}/teams`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name }),
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail);
                }
                input.value = '';
                // Reload to show QR codes
                window.location.reload();
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e.message;
            }
        }

        async function startGame() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            try {
                const resp = await fetch(`/api/games/${gameId}/start`, { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail);
                }
                window.location.href = `/host/${gameId}`;
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e.message;
                btn.disabled = false;
            }
        }

        // Allow enter key to add team
        document.getElementById('team-name-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTeam();
        });
    </script>
</body>
</html>
